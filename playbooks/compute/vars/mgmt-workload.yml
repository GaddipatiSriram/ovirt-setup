---
# MGMT Workload — runner / ephemeral-workload plane.
#
# 3-node kubeadm cluster on VLAN 11 (DevOps VPC, 10.10.2.0/24).
# Co-located with mgmt-control on the same VLAN.
#
# mgmt-control runs at .110-.112 (3-node HA control plane), MetalLB
# pool .200-.210, ingress VIP .200.
#
# mgmt-workload sits at .120-.122, MetalLB pool .211-.220, ingress
# VIP .211.
#
# 3-node HA topology — etcd quorum survives one node loss. Tight 8 GiB
# per node sizing to fit within the 251 GiB host budget (no-overcommit)
# alongside mgmt-control (3 × 16 GiB). Bursty CI workloads spawn agent
# pods that schedule and tear down.
#
# Bootstrap: this var file IS the input parameter set. The actual
# cluster creation flow is GitOps-driven (Crossplane / CAPI on
# mgmt-control), not the imperative ansible bootstrap-k8s.yml path.
# These values feed the Composition that provisions the VMs and runs
# the kubeadm bring-up.
#
# Role split (informs what runs here vs mgmt-control):
#   mgmt-control (control plane, durable):
#     - ArgoCD SRE + DevOps (vanilla helm; replaces OpenShift GitOps)
#     - Argo Workflows + Jenkins (platform CI/CD)
#     - Crossplane core + providers (manages remote clusters via
#       provider-kubernetes ProviderConfig — also drives THIS cluster's
#       creation)
#     - Backstage (developer portal — replaces OpenShift console)
#
#   mgmt-workload (workload plane, ephemeral / bursty / non-cross-cluster):
#     - actions-runner-controller (controller + listeners + runners,
#       Shape 1 — ARC isn't cross-cluster-capable so it lives entirely
#       on the cluster where its workloads run)
#     - Pattern A baseline (cert-manager, ingress-nginx, ESO, trivy,
#       rook-ceph-external) auto-generated via AppSet selectors
#     - Future: preview environments, ad-hoc workloads, anything that
#       benefits from "we'd be fine losing this for an hour"

vm_prefix: "mgmt-workload"
vm_count: 3
vm_size: "workload"                     # 8 GiB / 4 cores / 80 GiB root
network_name: "Mgmt-DevOps-Net"         # VLAN 11
template_name: "fedora-41-mgmt"

root_password: "unix"
admin_user: "admin"
admin_password: "unix"
domain: "engatwork.com"

# disk-prep
root_disk_grow_to_gb: 60
extra_disks: []                         # PVCs via ceph-rbd from mgmt-storage

# Deterministic MAC + IP pinning (cluster_id byte 'fd' distinguishes
# mgmt-workload from mgmt-control 'fb' and the legacy OKD oVirt-auto
# range 56:6f:1b:6a:*).
vm_macs:
  - "56:6f:1b:fd:0b:01"
  - "56:6f:1b:fd:0b:02"
  - "56:6f:1b:fd:0b:03"

vm_ips:
  - "10.10.2.120"
  - "10.10.2.121"
  - "10.10.2.122"
