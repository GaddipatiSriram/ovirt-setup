# Static bootstrap inventory.
#
# disk-prep.yml discovers the actual cluster VMs at runtime (by querying
# oVirt for {{ vm_prefix }}-*) and registers them via add_host, so this
# file only needs to declare the localhost-scoped 'engine' group that
# the first play runs against.

[engine]
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

[localhost_group]
localhost ansible_connection=local
