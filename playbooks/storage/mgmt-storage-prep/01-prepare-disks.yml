---
# Step 2 — Prepare mgmt-storage node disks for Ceph.
#
#   a. Resize the root disk in oVirt to {{ root_disk_grow_to_gb }} GB
#   b. In each VM, rescan SCSI, grow partition 4, grow btrfs FS
#   c. Create a new {{ ceph_osd_disk_size_gb }} GB disk per VM (name
#      ceph-osd-0N) and attach to the VM as an additional virtio_scsi disk
#   d. Rescan inside each VM so the new block device is visible for Ceph
#
# Idempotent — each task is a no-op if the target state already holds.

- name: Obtain oVirt SSO token
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get token from SSO
      ansible.builtin.uri:
        url: "{{ ovirt_engine_url }}/sso/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: password
          scope: ovirt-app-api
          username: "{{ ovirt_engine_user }}"
          password: "{{ ovirt_engine_password }}"
        headers:
          Accept: application/json
        validate_certs: false
      register: sso
      no_log: true

    - name: Expose token fact
      ansible.builtin.set_fact:
        ovirt_token: "{{ sso.json.access_token }}"

# ---------------------------------------------------------------------------
# a. Grow the root disk to {{ root_disk_grow_to_gb }} GB (oVirt side)
# ---------------------------------------------------------------------------
- name: Grow root disks in oVirt
  hosts: mgmt_storage
  gather_facts: false
  vars:
    ovirt_token: "{{ hostvars['localhost'].ovirt_token }}"
    target_bytes: "{{ root_disk_grow_to_gb | int * 1024 * 1024 * 1024 }}"
  tasks:
    - name: Get current disk state
      ansible.builtin.uri:
        url: "{{ ovirt_api_base }}/disks/{{ root_disk_id }}"
        headers:
          Accept: application/json
          Authorization: "Bearer {{ ovirt_token }}"
        validate_certs: false
      delegate_to: localhost
      register: disk_now

    - name: Resize disk if smaller than target
      ansible.builtin.uri:
        url: "{{ ovirt_api_base }}/disks/{{ root_disk_id }}"
        method: PUT
        headers:
          Accept: application/json
          Content-Type: application/json
          Authorization: "Bearer {{ ovirt_token }}"
        body_format: json
        body:
          provisioned_size: "{{ target_bytes }}"
        validate_certs: false
      delegate_to: localhost
      when: disk_now.json.provisioned_size | int < target_bytes | int

# ---------------------------------------------------------------------------
# b. In-VM: rescan SCSI, grow partition 4, grow btrfs filesystem
# ---------------------------------------------------------------------------
- name: Grow root filesystem inside VMs
  hosts: mgmt_storage
  gather_facts: true
  tasks:
    - name: Ensure growpart + parted present
      ansible.builtin.dnf:
        name:
          - cloud-utils-growpart
          - parted
        state: present

    - name: Rescan /dev/sda so kernel sees new size
      ansible.builtin.shell: |
        for h in /sys/class/scsi_device/*/device/rescan; do echo 1 > "$h"; done
        echo 1 > /sys/block/sda/device/rescan || true
      changed_when: false

    - name: Grow partition 4 to fill disk
      ansible.builtin.command: growpart /dev/sda 4
      register: gp
      changed_when: "'CHANGED' in gp.stdout"
      failed_when: gp.rc not in [0, 1]   # rc=1 means 'NOCHANGE'

    - name: Grow btrfs root filesystem
      ansible.builtin.command: btrfs filesystem resize max /
      register: bt
      changed_when: "'new size' in bt.stdout | lower"

    - name: Report new root size
      ansible.builtin.command: df -h /
      register: df_out
      changed_when: false

    - ansible.builtin.debug:
        msg: "{{ df_out.stdout_lines }}"

# ---------------------------------------------------------------------------
# c + d. Create and attach Ceph OSD disks, rescan in VM
# ---------------------------------------------------------------------------
- name: Attach Ceph OSD disks
  hosts: mgmt_storage
  gather_facts: false
  vars:
    ovirt_token: "{{ hostvars['localhost'].ovirt_token }}"
    osd_bytes: "{{ ceph_osd_disk_size_gb | int * 1024 * 1024 * 1024 }}"
    osd_alias: "{{ ceph_osd_disk_alias_prefix }}-{{ inventory_hostname | regex_replace('.*-0', '') }}"
  tasks:
    - name: List existing disk attachments
      ansible.builtin.uri:
        url: "{{ ovirt_api_base }}/vms/{{ ovirt_vm_id }}/diskattachments"
        headers:
          Accept: application/json
          Authorization: "Bearer {{ ovirt_token }}"
        validate_certs: false
      delegate_to: localhost
      register: attachments

    - name: Fetch details of each attached disk
      ansible.builtin.uri:
        url: "{{ ovirt_api_base }}/disks/{{ item.disk.id }}"
        headers:
          Accept: application/json
          Authorization: "Bearer {{ ovirt_token }}"
        validate_certs: false
      delegate_to: localhost
      loop: "{{ attachments.json.disk_attachment }}"
      loop_control:
        label: "{{ item.disk.id }}"
      register: disk_details

    - name: Compute whether the OSD disk is already attached
      ansible.builtin.set_fact:
        osd_already_attached: "{{ (disk_details.results | map(attribute='json') | map(attribute='alias') | list) | select('equalto', osd_alias) | list | length > 0 }}"

    - name: Create new OSD disk
      ansible.builtin.uri:
        url: "{{ ovirt_api_base }}/vms/{{ ovirt_vm_id }}/diskattachments"
        method: POST
        headers:
          Accept: application/json
          Content-Type: application/json
          Authorization: "Bearer {{ ovirt_token }}"
        body_format: json
        body:
          disk:
            alias: "{{ osd_alias }}"
            name: "{{ osd_alias }}"
            provisioned_size: "{{ osd_bytes }}"
            format: cow
            sparse: true
            storage_domains:
              storage_domain:
                - id: "{{ ovirt_data_storage_domain_id }}"
          interface: virtio_scsi
          bootable: false
          active: true
        validate_certs: false
        status_code: [200, 201]
      delegate_to: localhost
      when: not osd_already_attached

    - name: Rescan SCSI in VM so new disk is visible
      ansible.builtin.shell: |
        for h in /sys/class/scsi_host/host*/scan; do echo '- - -' > "$h"; done
      changed_when: false

    - name: Confirm a non-root disk is visible
      ansible.builtin.shell: |
        set -e
        lsblk -dn -o NAME,SIZE,TYPE | awk '$3=="disk" && $1!="sda"{print}'
      register: extras
      changed_when: false

    - ansible.builtin.debug:
        msg: "extra disks on {{ inventory_hostname }}: {{ extras.stdout_lines }}"
